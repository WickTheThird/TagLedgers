<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Auth token capture - multiple methods for reliability
			(function() {
				// Method 1: Hash fragment
				var h = window.location.hash;
				if (h && h.indexOf('#token=') === 0) {
					try {
						localStorage.setItem('tagledger_token', decodeURIComponent(h.substring(7)));
						history.replaceState(null, '', window.location.pathname);
					} catch(e) {}
				}
				// Method 2: Query param fallback
				var params = new URLSearchParams(window.location.search);
				var t = params.get('token');
				if (t) {
					try {
						localStorage.setItem('tagledger_token', t);
						history.replaceState(null, '', window.location.pathname);
					} catch(e) {}
				}
				// Method 3: Listen for postMessage from Worker auth page (iframe)
				window.addEventListener('message', function(e) {
					if (e.data && e.data.type === 'tagledger_token' && e.data.token) {
						localStorage.setItem('tagledger_token', e.data.token);
					}
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
